<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2d35"/>
      <stop offset="100%" stop-color="#1b1d23"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8ba4dd"/>
      <stop offset="100%" stop-color="#6b8acd"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b8acd"/>
      <stop offset="100%" stop-color="#4a6aa5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle inner shadow/border -->
  <rect x="4" y="4" width="1016" height="1016" rx="218" ry="218" fill="none" stroke="#3a3d45" stroke-width="2" opacity="0.5"/>

  <!-- Magnifying glass handle -->
  <line x1="620" y1="620" x2="780" y2="780" stroke="url(#handle)" stroke-width="64" stroke-linecap="round"/>

  <!-- Magnifying glass ring (outer) -->
  <circle cx="440" cy="440" r="220" fill="none" stroke="url(#ring)" stroke-width="56"/>

  <!-- Magnifying glass ring (inner glow) -->
  <circle cx="440" cy="440" r="220" fill="none" stroke="#8ba4dd" stroke-width="2" opacity="0.3"/>

  <!-- Glass fill (subtle) -->
  <circle cx="440" cy="440" r="192" fill="#1b1d23" opacity="0.6"/>

  <!-- "S" letterform inside the glass -->
  <text x="440" y="500" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="320" font-weight="700" fill="#d4d8e8" text-anchor="middle" opacity="0.95">S</text>
</svg>
