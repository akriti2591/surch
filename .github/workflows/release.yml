name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            arch: arm64
          - target: x86_64-apple-darwin
            runner: macos-13
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Create .app bundle
        run: |
          APP_NAME="Surch"
          APP_DIR="${APP_NAME}.app/Contents"
          mkdir -p "${APP_DIR}/MacOS"
          mkdir -p "${APP_DIR}/Resources"

          # Copy binary
          cp "target/${{ matrix.target }}/release/surch" "${APP_DIR}/MacOS/surch"

          # Copy app icon
          cp "crates/surch-app/assets/AppIcon.icns" "${APP_DIR}/Resources/AppIcon.icns"

          # Create Info.plist
          VERSION="${GITHUB_REF_NAME#v}"
          cat > "${APP_DIR}/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleDisplayName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>com.surch.app</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>surch</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          DMG_NAME="surch-${GITHUB_REF_NAME}-macos-${{ matrix.arch }}"
          hdiutil create -volname "Surch" \
            -srcfolder "Surch.app" \
            -ov -format UDZO \
            "${DMG_NAME}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: surch-${{ matrix.arch }}
          path: "*.dmg"

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          generate_release_notes: true
          draft: false
